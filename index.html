<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Eletromidia NOC — Dashboard N1</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root {
      --bg: #050505;
      --card: #121212;
      --accent: #f05a22; 
      --text: #ffffff;
      --muted: #888888;
      --line: #222222;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: #000;
      border-bottom: 1px solid var(--line);
    }

    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
    .brand span { color: var(--accent); }
    .brand .noc { color: var(--text); font-weight: 300; border-left: 1px solid #333; padding-left: 10px; }

    main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
    }

    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 16px; }

    /* Dropzone Corrigida */
    .drop {
      border: 2px dashed #333;
      border-radius: 6px;
      padding: 30px 15px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      background: rgba(255,255,255,0.02);
    }
    .drop.dragover { border-color: var(--accent); background: rgba(240,90,34,0.1); }
    .drop strong { display: block; font-size: 13px; margin-bottom: 5px; pointer-events: none; }
    .drop span { font-size: 11px; color: var(--muted); pointer-events: none; }

    .kpis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .kpi { padding: 12px; background: #181818; border-radius: 6px; border-left: 3px solid #333; }
    .kpi.total { border-left-color: var(--accent); }
    .kpi.dentro { border-left-color: var(--good); }
    .kpi.alerta { border-left-color: var(--warn); }
    .kpi.atrasado { border-left-color: var(--bad); }
    .kpi .label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 600; }
    .kpi .value { font-size: 22px; font-weight: 700; margin-top: 4px; }

    .filters { display: flex; gap: 12px; flex-wrap: wrap; }
    .field { flex: 1; min-width: 140px; }
    label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
    select, input {
      width: 100%; background: #181818; border: 1px solid var(--line);
      color: #fff; padding: 8px; border-radius: 4px; outline: none; font-size: 13px;
    }

    .table-container { overflow: auto; max-height: 500px; background: #0f0f0f; border-radius: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { background: #1a1a1a; padding: 12px; text-align: left; color: var(--muted); position: sticky; top: 0; z-index: 5; }
    tbody td { padding: 10px 12px; border-bottom: 1px solid var(--line); color: #ccc; }
    
    .status { padding: 3px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }
    .status.good { background: rgba(34,197,94,0.15); color: var(--good); }
    .status.warn { background: rgba(245,158,11,0.15); color: var(--warn); }
    .status.bad { background: rgba(239,68,68,0.15); color: var(--bad); }

    .btn {
      background: var(--accent); color: white; border: none; padding: 10px;
      border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 12px; width: 100%;
    }
    .btn.secondary { background: #222; margin-top: 8px; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .grid-pracas { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 10px; }
    .mini-card { background: #181818; padding: 12px; border-radius: 6px; border: 1px solid var(--line); }
    .mini-card h3 { margin: 0 0 10px; font-size: 12px; color: var(--accent); text-transform: uppercase; }
    .mini-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }

    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000;
      display: none; align-items: center; justify-content: center; flex-direction: column; gap: 15px;
    }
    .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1000px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <div class="brand"><span>eletromidia</span> <div class="noc">NOC</div></div>
  <div style="font-size: 11px; color: var(--muted);">MONITORAMENTO N1</div>
</header>

<main>
  <div class="sidebar">
    <div class="card">
      <div class="drop" id="dropZone">
        <strong>Importar Planilha</strong>
        <span>Clique ou arraste o arquivo</span>
      </div>
      <input type="file" id="fileInput" style="display:none" accept=".xlsx,.xls,.xlsm" />
      <button class="btn secondary" onclick="location.reload()">Limpar Dashboard</button>
      <div id="fileInfo" style="font-size:10px; color:var(--muted); margin-top:12px; text-align:center;">Aguardando arquivo...</div>
    </div>

    <div class="card">
      <div class="kpis-grid">
        <div class="kpi total"><div class="label">Total</div><div class="value" id="kpiTotal">0</div></div>
        <div class="kpi dentro"><div class="label">No Prazo</div><div class="value" id="kpiDentro">0</div></div>
        <div class="kpi alerta"><div class="label">Alerta</div><div class="value" id="kpiProximo">0</div></div>
        <div class="kpi atrasado"><div class="label">Crítico</div><div class="value" id="kpiEstourado">0</div></div>
      </div>
    </div>

    <button class="btn" id="exportBtn" disabled onclick="exportarExcel()">Exportar Filtrados</button>
  </div>

  <div class="content">
    <div class="card" style="margin-bottom:16px;">
      <div class="filters">
        <div class="field">
          <label>Praça</label>
          <select id="pracaSelect" onchange="filtrar()"><option value="">Todas</option></select>
        </div>
        <div class="field">
          <label>Ambiente</label>
          <select id="ambienteSelect" onchange="filtrar()"><option value="">Todos</option></select>
        </div>
        <div class="field" style="flex: 2;">
          <label>Buscar</label>
          <input id="searchInput" type="text" placeholder="Ponto, OS ou Endereço..." oninput="filtrar()" />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>OS</th>
              <th>Praça</th>
              <th>Ponto</th>
              <th>Abertura</th>
              <th>Tempo</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" style="text-align:center; padding:50px; color:#444;">Nenhum dado carregado.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="grid-pracas" id="cardsPraca"></div>
  </div>
</main>

<div id="overlay">
  <div class="spinner"></div>
  <div id="overlayMsg">Processando...</div>
</div>

<script>
  let dadosOriginais = [];
  let dadosFiltrados = [];

  // 1. Configurar cliques e Arraste
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.onclick = () => fileInput.click();
  
  fileInput.onchange = (e) => {
    if (e.target.files.length > 0) processarArquivo(e.target.files[0]);
  };

  dropZone.ondragover = (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  };

  dropZone.ondragleave = () => dropZone.classList.remove('dragover');

  dropZone.ondrop = (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) processarArquivo(e.dataTransfer.files[0]);
  };

  // 2. Processar o Excel
  function processarArquivo(file) {
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('fileInfo').textContent = "Carregando: " + file.name;

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array', cellDates: true });
        const primeiraAba = workbook.Sheets[workbook.SheetNames[0]];
        const lista = XLSX.utils.sheet_to_json(primeiraAba, { defval: "" });

        // Mapeamento de colunas (tenta achar os nomes mais comuns)
        dadosOriginais = lista.map(item => {
          // Busca data de criação em colunas comuns
          const dataCriacao = item["Data de Criação"] || item["Abertura"] || item["Criação"] || item["Data"];
          const nivel = (item["Nível"] || item["Nivel"] || "").toString().toLowerCase();
          
          return {
            os: item["Nº"] || item["ID"] || item["OS"] || "---",
            praca: item["Praça"] || item["Praca"] || item["Regional"] || "Outros",
            ponto: item["Ponto"] || item["Local"] || "---",
            ambiente: item["Ambiente"] || "---",
            endereco: item["Endereço"] || item["Endereco"] || "",
            nivel: nivel,
            abertura: dataCriacao instanceof Date ? dataCriacao : new Date(dataCriacao)
          };
        }).filter(item => item.nivel.includes("n1") || item.nivel === "1"); // Só N1

        // Preencher filtros
        popularFiltros();
        filtrar();
        
        document.getElementById('exportBtn').disabled = false;
      } catch (err) {
        alert("Erro ao ler o Excel. Verifique se o arquivo está correto.");
        console.error(err);
      } finally {
        document.getElementById('overlay').style.display = 'none';
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function popularFiltros() {
    const pracas = [...new Set(dadosOriginais.map(d => d.praca))].sort();
    const amb = [...new Set(dadosOriginais.map(d => d.ambiente))].sort();
    
    const sPraca = document.getElementById('pracaSelect');
    const sAmb = document.getElementById('ambienteSelect');

    pracas.forEach(p => sPraca.add(new Option(p, p)));
    amb.forEach(a => sAmb.add(new Option(a, a)));
  }

  function filtrar() {
    const praca = document.getElementById('pracaSelect').value;
    const amb = document.getElementById('ambienteSelect').value;
    const busca = document.getElementById('searchInput').value.toLowerCase();
    const agora = new Date();

    dadosFiltrados = dadosOriginais.filter(d => {
      const matchPraca = !praca || d.praca === praca;
      const matchAmb = !amb || d.ambiente === amb;
      const matchBusca = !busca || (d.os + d.ponto + d.praca + d.endereco).toLowerCase().includes(busca);
      return matchPraca && matchAmb && matchBusca;
    }).map(d => {
      const diffHoras = d.abertura && !isNaN(d.abertura) ? Math.floor((agora - d.abertura) / (1000 * 60 * 60)) : null;
      let status = "Sem data";
      if (diffHoras !== null) {
        if (diffHoras >= 48) status = "Estourado";
        else if (diffHoras >= 36) status = "Próximo do vencimento";
        else status = "Dentro do SLA";
      }
      return { ...d, horas: diffHoras, statusSLA: status };
    });

    atualizarTela();
  }

  function atualizarTela() {
    // KPIs
    document.getElementById('kpiTotal').textContent = dadosFiltrados.length;
    document.getElementById('kpiDentro').textContent = dadosFiltrados.filter(d => d.statusSLA === "Dentro do SLA").length;
    document.getElementById('kpiProximo').textContent = dadosFiltrados.filter(d => d.statusSLA === "Próximo do vencimento").length;
    document.getElementById('kpiEstourado').textContent = dadosFiltrados.filter(d => d.statusSLA === "Estourado").length;

    // Tabela
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = dadosFiltrados.sort((a,b) => (b.horas || 0) - (a.horas || 0)).slice(0, 100).map(d => `
      <tr>
        <td><b>${d.os}</b></td>
        <td>${d.praca}</td>
        <td>${d.ponto}</td>
        <td>${d.abertura && !isNaN(d.abertura) ? d.abertura.toLocaleString() : '---'}</td>
        <td>${d.horas !== null ? d.horas + 'h' : '---'}</td>
        <td><span class="status ${getClass(d.statusSLA)}">${d.statusSLA}</span></td>
      </tr>
    `).join("");

    // Cards Praça
    const resumo = {};
    dadosFiltrados.forEach(d => {
      if(!resumo[d.praca]) resumo[d.praca] = {t:0, e:0};
      resumo[d.praca].t++;
      if(d.statusSLA === "Estourado") resumo[d.praca].e++;
    });

    document.getElementById('cardsPraca').innerHTML = Object.entries(resumo).map(([nome, info]) => `
      <div class="mini-card">
        <h3>${nome}</h3>
        <div class="mini-row"><span>Total N1</span><b>${info.t}</b></div>
        <div class="mini-row"><span>Críticos</span><b style="color:var(--bad)">${info.e}</b></div>
      </div>
    `).join("");
  }

  function getClass(s) {
    if(s === "Dentro do SLA") return "good";
    if(s === "Próximo do vencimento") return "warn";
    if(s === "Estourado") return "bad";
    return "";
  }

  function exportarExcel() {
    const ws = XLSX.utils.json_to_sheet(dadosFiltrados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Filtro_NOC");
    XLSX.writeFile(wb, "Relatorio_N1_NOC.xlsx");
  }
</script>

</body>
</html>
