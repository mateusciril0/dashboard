<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Eletromidia NOC — Dashboard N1</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root {
      --bg: #050505;
      --card: #121212;
      --accent: #f05a22; 
      --text: #ffffff;
      --muted: #888888;
      --line: #222222;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #000;
      border-bottom: 1px solid var(--line);
    }

    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
    .brand span { color: var(--accent); }
    .brand .noc { color: var(--text); font-weight: 300; border-left: 1px solid #333; padding-left: 10px; }

    main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
    }

    .sidebar { display: flex; flex-direction: column; gap: 16px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 16px; }

    /* DROPZONE REFORÇADA */
    .drop {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 30px 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(255,255,255,0.01);
    }
    .drop:hover, .drop.dragover { border-color: var(--accent); background: rgba(240,90,34,0.05); }
    .drop strong { display: block; font-size: 13px; margin-bottom: 5px; pointer-events: none; }
    .drop span { font-size: 11px; color: var(--muted); pointer-events: none; }

    .kpis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .kpi { padding: 12px; background: #181818; border-radius: 6px; border-left: 3px solid #333; }
    .kpi.total { border-left-color: var(--accent); }
    .kpi.dentro { border-left-color: var(--good); }
    .kpi.alerta { border-left-color: var(--warn); }
    .kpi.atrasado { border-left-color: var(--bad); }
    .kpi .label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 600; }
    .kpi .value { font-size: 22px; font-weight: 700; margin-top: 4px; }

    .filters { display: flex; gap: 12px; flex-wrap: wrap; }
    .field { flex: 1; min-width: 140px; }
    label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
    select, input {
      width: 100%; background: #181818; border: 1px solid var(--line);
      color: #fff; padding: 10px; border-radius: 6px; outline: none; font-size: 13px;
    }

    .table-container { overflow: auto; max-height: 500px; background: #0f0f0f; border-radius: 4px; border: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
    thead th { background: #1a1a1a; padding: 12px; text-align: left; color: var(--muted); position: sticky; top: 0; z-index: 5; }
    tbody td { padding: 10px 12px; border-bottom: 1px solid var(--line); color: #ccc; }
    
    .status { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .status.good { background: rgba(34,197,94,0.1); color: var(--good); }
    .status.warn { background: rgba(245,158,11,0.1); color: var(--warn); }
    .status.bad { background: rgba(239,68,68,0.1); color: var(--bad); }

    .btn {
      background: var(--accent); color: white; border: none; padding: 12px;
      border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 12px; width: 100%; text-transform: uppercase;
    }
    .btn.secondary { background: #252525; margin-top: 8px; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .grid-pracas { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 20px; }
    .mini-card { background: #181818; padding: 14px; border-radius: 8px; border: 1px solid var(--line); }
    .mini-card h3 { margin: 0 0 10px; font-size: 12px; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; }
    .mini-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; }

    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
      display: none; align-items: center; justify-content: center; flex-direction: column; gap: 15px;
    }
    .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1100px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <div class="brand"><span>eletromidia</span> <div class="noc">NOC</div></div>
  <div style="font-size: 10px; color: var(--muted); letter-spacing: 1px;">SLA MONITOR v2.6</div>
</header>

<main>
  <div class="sidebar">
    <div class="card">
      <div class="drop" id="dropZone">
        <strong>IMPORTAR PLANILHA</strong>
        <span>Solte o arquivo Excel aqui</span>
      </div>
      <input type="file" id="fileInput" style="display:none" accept=".xlsx,.xls,.xlsm" />
      <button class="btn secondary" onclick="window.location.reload()">Resetar Sistema</button>
      <div id="fileStatus" style="font-size:10px; color:var(--muted); margin-top:12px; text-align:center;">Status: Aguardando entrada.</div>
    </div>

    <div class="card">
      <div class="kpis-grid">
        <div class="kpi total"><div class="label">Total N1</div><div class="value" id="kpiTotal">0</div></div>
        <div class="kpi dentro"><div class="label">SLA OK</div><div class="value" id="kpiDentro">0</div></div>
        <div class="kpi alerta"><div class="label">Alerta</div><div class="value" id="kpiProximo">0</div></div>
        <div class="kpi atrasado"><div class="label">Crítico</div><div class="value" id="kpiEstourado">0</div></div>
      </div>
    </div>

    <button class="btn" id="exportBtn" disabled onclick="exportarExcel()">Exportar Relatório</button>
  </div>

  <div class="content">
    <div class="card" style="margin-bottom:16px;">
      <div class="filters">
        <div class="field">
          <label>Praça</label>
          <select id="pracaSelect"><option value="">Todas as Praças</option></select>
        </div>
        <div class="field">
          <label>Ambiente</label>
          <select id="ambienteSelect"><option value="">Todos os Ambientes</option></select>
        </div>
        <div class="field" style="flex: 2;">
          <label>Pesquisar</label>
          <input id="searchInput" type="text" placeholder="Ponto, OS, Endereço..." />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="table-container">
        <table id="mainTable">
          <thead>
            <tr>
              <th>OS / ID</th>
              <th>Praça</th>
              <th>Ponto de Exibição</th>
              <th>Data Abertura</th>
              <th>Tempo (h)</th>
              <th>Status SLA</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" style="text-align:center; padding:80px; color:#444;">Nenhuma base de dados carregada.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="grid-pracas" id="cardsPraca"></div>
  </div>
</main>

<div id="overlay">
  <div class="spinner"></div>
  <div id="overlayMsg" style="font-weight: 700; letter-spacing: 1px;">PROCESSANDO...</div>
  <div id="overlayProgress" style="font-size: 11px; color: var(--muted);">0%</div>
</div>

<script>
/* --- CONFIGURAÇÕES DE MAPEAMENTO (Igual ao original que funcionava) --- */
const COLS = {
  numero: ["nº", "no", "numero", "número", "n°", "os", "ordem", "id"],
  ponto: ["ponto", "local", "nome do ponto"],
  endereco: ["endereço", "endereco", "logradouro", "rua"],
  ambiente: ["ambiente"],
  praca: ["praça", "praca", "uf", "regional"],
  nivel: ["nível", "nivel", "n1/n2/n3", "level"],
  criacao: ["data de criação", "data de criacao", "abertura", "data abertura", "data de abertura", "criação", "criacao"]
};

let rowsAll = [];
const $ = (id) => document.getElementById(id);

/* --- EVENTOS DE INTERFACE --- */
const dropZone = $('dropZone');
const fileInput = $('fileInput');

dropZone.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
  if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});

/* --- PROCESSAMENTO CORE --- */
function handleFile(file) {
  $('overlay').style.display = 'flex';
  $('fileStatus').textContent = "Lendo: " + file.name;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array', cellDates: true });
      
      // Busca a melhor aba (com mais dados)
      const sheetName = workbook.SheetNames[0];
      const worksheet = workbook.Sheets[sheetName];
      const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

      if (json.length === 0) throw new Error("A planilha parece estar vazia.");

      // Identificar Colunas
      const headers = Object.keys(json[0]);
      const mapping = {};
      for (const [key, aliases] of Object.entries(COLS)) {
        mapping[key] = headers.find(h => aliases.some(a => h.toLowerCase().includes(a)));
      }

      // Processar Linhas
      rowsAll = json.map(r => {
        const nivelRaw = String(r[mapping.nivel] || "").toLowerCase();
        const dateRaw = r[mapping.criacao];
        
        return {
          numero: String(r[mapping.numero] || ""),
          ponto: String(r[mapping.ponto] || ""),
          praca: String(r[mapping.praca] || "N/A"),
          ambiente: String(r[mapping.ambiente] || "N/A"),
          endereco: String(r[mapping.endereco] || ""),
          nivel: nivelRaw,
          criacao: dateRaw instanceof Date ? dateRaw : new Date(dateRaw)
        };
      }).filter(r => r.nivel.includes("n1") || r.nivel === "1");

      popularFiltros();
      render();
      $('exportBtn').disabled = false;
      $('fileStatus').textContent = `Sucesso: ${rowsAll.length} chamados N1.`;
    } catch (err) {
      alert("Erro ao processar: " + err.message);
      $('fileStatus').textContent = "Erro no carregamento.";
    } finally {
      $('overlay').style.display = 'none';
    }
  };
  reader.readAsArrayBuffer(file);
}

function popularFiltros() {
  const pracas = [...new Set(rowsAll.map(r => r.praca))].sort();
  const ambientes = [...new Set(rowsAll.map(r => r.ambiente))].sort();
  
  const ps = $('pracaSelect');
  const as = $('ambienteSelect');

  ps.innerHTML = '<option value="">Todas as Praças</option>';
  as.innerHTML = '<option value="">Todos os Ambientes</option>';

  pracas.forEach(p => ps.add(new Option(p, p)));
  ambientes.forEach(a => as.add(new Option(a, a)));

  ps.onchange = render;
  as.onchange = render;
  $('searchInput').oninput = render;
}

function render() {
  const now = new Date();
  const fPraca = $('pracaSelect').value;
  const fAmb = $('ambienteSelect').value;
  const fSearch = $('searchInput').value.toLowerCase();

  const filtered = rowsAll.filter(r => {
    const mP = !fPraca || r.praca === fPraca;
    const mA = !fAmb || r.ambiente === fAmb;
    const mS = !fSearch || (r.numero + r.ponto + r.endereco).toLowerCase().includes(fSearch);
    return mP && mA && mS;
  }).map(r => {
    const hrs = r.criacao && !isNaN(r.criacao) ? Math.floor((now - r.criacao) / 36e5) : null;
    let status = "Sem data";
    if (hrs !== null) {
      if (hrs >= 48) status = "Estourado";
      else if (hrs >= 36) status = "Próximo do vencimento";
      else status = "Dentro do SLA";
    }
    return { ...r, horas: hrs, statusSLA: status };
  });

  // KPIs
  $('kpiTotal').textContent = filtered.length;
  $('kpiDentro').textContent = filtered.filter(f => f.statusSLA === "Dentro do SLA").length;
  $('kpiProximo').textContent = filtered.filter(f => f.statusSLA === "Próximo do vencimento").length;
  $('kpiEstourado').textContent = filtered.filter(f => f.statusSLA === "Estourado").length;

  // Tabela
  const tbody = $('tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;">Nenhum chamado encontrado.</td></tr>';
  } else {
    tbody.innerHTML = filtered.sort((a,b) => (b.horas || 0) - (a.horas || 0)).slice(0, 200).map(r => `
      <tr>
        <td><b>${r.numero}</b></td>
        <td>${r.praca}</td>
        <td>${r.ponto}</td>
        <td>${r.criacao && !isNaN(r.criacao) ? r.criacao.toLocaleString('pt-BR') : '—'}</td>
        <td>${r.horas !== null ? r.horas + 'h' : '—'}</td>
        <td><span class="status ${getStatusClass(r.statusSLA)}">${r.statusSLA}</span></td>
      </tr>
    `).join("");
  }

  // Cards de Regional
  const regionalData = {};
  filtered.forEach(r => {
    if (!regionalData[r.praca]) regionalData[r.praca] = { total: 0, bad: 0 };
    regionalData[r.praca].total++;
    if (r.statusSLA === "Estourado") regionalData[r.praca].bad++;
  });

  $('cardsPraca').innerHTML = Object.entries(regionalData).map(([name, data]) => `
    <div class="mini-card">
      <h3>${name}</h3>
      <div class="mini-row"><span>Total N1</span><b>${data.total}</b></div>
      <div class="mini-row"><span>Estourados</span><b style="color:var(--bad)">${data.bad}</b></div>
    </div>
  `).join("");
}

function getStatusClass(s) {
  if (s === "Dentro do SLA") return "good";
  if (s === "Próximo do vencimento") return "warn";
  if (s === "Estourado") return "bad";
  return "";
}

function exportarExcel() {
  const ws = XLSX.utils.json_to_sheet(rowsAll);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Dados_Filtrados");
  XLSX.writeFile(wb, `NOC_N1_Report.xlsx`);
}
</script>
</body>
</html>
