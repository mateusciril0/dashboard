<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dashboard — Chamados N1 em Aberto (SLA 48h)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0b0f14; --card:#111827; --muted:#94a3b8; --text:#e5e7eb; --line:#1f2937;
  --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --accent:#f43f5e; --soft:#64748b;
}
*{box-sizing:border-box}

body{
  margin:0;
  font-family: ui-sans-serif, system-ui;
  background: var(--bg);
  color:var(--text);
}

/* HEADER MAIS COMPACTO */
header{
  padding:12px 16px 4px;
  max-width:1200px;
  margin:0 auto;
}
h1{margin:0;font-size:18px}
.sub{font-size:12px;color:var(--muted)}

main{
  max-width:1200px;
  margin:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* TOPO */
.row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
}

/* UPLOADER COMPACTO */
.uploader{
  flex:1;
  display:flex;
  gap:10px;
  align-items:center;
}

.drop{
  flex:1;
  border:1px dashed var(--line);
  border-radius:10px;
  padding:8px;
  font-size:12px;
  cursor:pointer;
}
.drop strong{font-size:13px}
.drop span{font-size:11px;color:var(--muted)}

.btn{
  padding:6px 10px;
  font-size:12px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  background:var(--accent);
  color:white;
}
.btn.secondary{background:#334155}

/* KPI COMPACTO */
.kpis{
  flex:1;
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:6px;
}

.kpi{
  padding:8px;
  border:1px solid var(--line);
  border-radius:10px;
}
.kpi .label{font-size:11px;color:var(--muted)}
.kpi .value{font-size:18px;font-weight:800}

/* PILLS */
.pill{
  font-size:10px;
  display:flex;
  gap:8px;
  margin-top:4px;
}
.dot{width:6px;height:6px;border-radius:50%}
.good{background:var(--good)}
.warn{background:var(--warn)}
.bad{background:var(--bad)}
.soft{background:var(--soft)}

/* FILTROS */
.filters{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.field{
  display:flex;
  flex-direction:column;
  font-size:11px;
}
select,input{
  padding:6px;
  border-radius:8px;
  background:#0b0f14;
  color:white;
  border:1px solid var(--line);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

/* TABELA */
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}
th,td{
  padding:6px;
  border-bottom:1px solid var(--line);
}

.status.good{color:var(--good)}
.status.warn{color:var(--warn)}
.status.bad{color:var(--bad)}

</style>
</head>

<body>

<header>
<h1>Chamados N1 em Aberto</h1>
<p class="sub">SLA 48h</p>
</header>

<main>

<section class="row">

<div class="card uploader">
<div class="drop" id="dropZone">
<strong>Arraste planilha</strong>
<span>.xlsx</span>
</div>

<button class="btn" id="pickBtn">Selecionar</button>
<button class="btn secondary" id="resetBtn">Limpar</button>

<div class="pill">
<div class="dot good"></div>Dentro
<div class="dot warn"></div>Próximo
<div class="dot bad"></div>Estourado
</div>

<input type="file" id="fileInput" hidden>
</div>

<div class="card kpis">
<div class="kpi"><div class="label">Total</div><div class="value" id="kpiTotal">—</div></div>
<div class="kpi"><div class="label">Dentro</div><div class="value" id="kpiDentro">—</div></div>
<div class="kpi"><div class="label">Próximo</div><div class="value" id="kpiProximo">—</div></div>
<div class="kpi"><div class="label">Estourado</div><div class="value" id="kpiEstourado">—</div></div>
</div>

</section>

<section class="card">
<div class="filters">
<div class="field">
<label>Praça</label>
<select id="pracaSelect"></select>
</div>

<div class="field">
<label>Ambiente</label>
<select id="ambienteSelect"></select>
</div>

<div class="field">
<label>Área</label>
<select id="areaSelect"></select>
</div>

<div class="field">
<label>Busca</label>
<input id="searchInput">
</div>
</div>
</section>

<section class="card">
<h3>Resumo</h3>
<div id="cardsPraca" class="grid"></div>
</section>

<section class="card">
<h3>Detalhamento</h3>
<table>
<thead>
<tr>
<th>Nº</th>
<th>Praça</th>
<th>Horas</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</section>

</main>

<script>
// SIMPLIFICADO PARA TESTE VISUAL
document.getElementById("kpiTotal").textContent = 315;
document.getElementById("kpiDentro").textContent = 102;
document.getElementById("kpiProximo").textContent = 41;
document.getElementById("kpiEstourado").textContent = 172;
</script>

</body>
</html>
